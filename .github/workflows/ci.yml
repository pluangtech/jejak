name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - run: pnpm check:verbs
      # User-docs guards (item 4.5). `pnpm test` already runs tests/docs/**; this extra step fails
      # loudly if commands.md wasn't regenerated after a CLI change.
      - run: pnpm docs:gen && git diff --exit-code docs/user/commands.md
